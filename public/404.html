<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outworx</title>
    <!--
      SPA fallback for GitHub Pages.
      GitHub serves this file (with a 404 status) for any path it can't find on
      disk. We instantly rewrite the deep link into a query string and redirect
      to the site root, which IS served with a 200. index.html then restores the
      real path. This is the rafgraph/spa-github-pages technique.
      pathSegmentsToKeep = 0 because the site is served at the domain root.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
